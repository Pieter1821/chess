name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run core unit tests
        run: dotnet test tests/Chess.Core.Tests.csproj -c Release --nologo

      - name: Build game C# project
        run: dotnet build Chess.csproj -c Debug --nologo
